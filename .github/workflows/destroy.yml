# ─────────────────────────────────────────────────────────────────────────────
# Azure Demo Environment (ADE) — Destroy Workflow
#
# DANGER: Permanently deletes all ADE resource groups for the given prefix.
# Manual trigger ONLY — never runs on push.
# Protected by the 'demo' environment (require reviewers MUST be configured
# in Settings → Environments → demo → Required reviewers).
#
# Required secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
# ─────────────────────────────────────────────────────────────────────────────

name: ADE — Destroy

on:
  workflow_dispatch:
    inputs:
      prefix:
        description: 'Prefix of the environment to destroy (e.g. ade)'
        required: true
        default: 'ade'
        type: string
      modules:
        description: 'Specific modules to destroy (blank = all). Comma-separated: compute,storage'
        required: false
        default: ''
        type: string
      no_wait:
        description: 'Delete resource groups asynchronously (faster, no progress)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Shares the same concurrency group as the deploy workflow so a destroy
# waits for any in-progress deploy of the same prefix (and vice versa).
concurrency:
  group: ade-deploy-${{ github.event.inputs.prefix }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: Destroy — prefix=${{ github.event.inputs.prefix }}
    runs-on: ubuntu-latest
    environment: demo        # <-- add required reviewers here for extra safety
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3.0.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install PowerShell 7
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq powershell

      - name: Validate prefix input
        env:
          ADE_PREFIX: ${{ github.event.inputs.prefix }}
        run: |
          if ! [[ "$ADE_PREFIX" =~ ^[a-z0-9]{2,8}$ ]]; then
            echo "::error::prefix must be 2-8 lowercase alphanumeric characters. Got: '$ADE_PREFIX'"
            exit 1
          fi
          echo "✓ prefix='$ADE_PREFIX' — format OK"

      - name: List targeted resource groups (dry run)
        env:
          ADE_PREFIX: ${{ github.event.inputs.prefix }}
        run: |
          PREFIX="$ADE_PREFIX"
          echo "### Resource groups to be deleted:" >> "$GITHUB_STEP_SUMMARY"
          az group list \
            --query "[?tags.managedBy=='ade' && starts_with(name,'${PREFIX}-')].name" \
            -o tsv | while read rg; do
              echo "- \`$rg\`" >> "$GITHUB_STEP_SUMMARY"
              echo "  → $rg"
            done

      - name: Destroy ADE environment
        shell: pwsh
        # Pass all user-provided inputs through env vars — never interpolate
        # string inputs directly into the run: block (injection hardening).
        env:
          ADE_PREFIX:       ${{ github.event.inputs.prefix }}
          ADE_MODULES:      ${{ github.event.inputs.modules }}
          ADE_SUBSCRIPTION: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          $modulesArg = @()
          if ($env:ADE_MODULES) {
            $modulesArg = $env:ADE_MODULES -split ',' | ForEach-Object { $_.Trim() }
          }

          $noWait = '${{ github.event.inputs.no_wait }}' -eq 'true'  # choice input — safe

          $splat = @{
            Prefix         = $env:ADE_PREFIX
            SubscriptionId = $env:ADE_SUBSCRIPTION
            Force          = $true
            NoWait         = $noWait
          }
          if ($modulesArg.Count -gt 0) { $splat['Modules'] = $modulesArg }

          ./scripts/destroy.ps1 @splat

      - name: Write job summary
        if: always()
        env:
          ADE_PREFIX:   ${{ github.event.inputs.prefix }}
          ADE_MODULES:  ${{ github.event.inputs.modules || 'all' }}
          ADE_NO_WAIT:  ${{ github.event.inputs.no_wait }}
        run: |
          {
            echo ""
            echo "## Destroy Result: ${{ job.status }}"
            echo ""
            echo "| Field   | Value |"
            echo "|---------|-------|"
            echo "| Prefix  | \`${ADE_PREFIX}\` |"
            echo "| Modules | ${ADE_MODULES} |"
            echo "| No-wait | ${ADE_NO_WAIT} |"
            echo "| Run     | [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
