# ─────────────────────────────────────────────────────────────────────────────
# Azure Demo Environment (ADE) — Release Workflow
#
# Triggers on version tags: v1.0.0, v1.2.3, etc.
#
# Steps:
#   1. Extract the matching section from CHANGELOG.md
#   2. Create a GitHub Release with those notes
#   3. Publish the AzureDemoEnvironment module to the PowerShell Gallery
#      (skipped with a notice when the PSGALLERY_API_KEY secret is not set)
#
# Tagging convention (Semantic Versioning):
#   MAJOR — breaking changes to the deploy/destroy interface or output contract
#   MINOR — new modules, new parameters with defaults, new features
#   PATCH — bug fixes, test fixes, documentation, CI tweaks
# ─────────────────────────────────────────────────────────────────────────────

name: ADE — Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Extract changelog for this version
        id: changelog
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"          # e.g. v1.2.3
          $version = $tag -replace '^v', ''             # e.g. 1.2.3

          $content   = Get-Content CHANGELOG.md -Raw
          # Match from "## [X.Y.Z]" to the next "## [" (or end of file)
          $pattern   = "(?s)## \[$([regex]::Escape($version))\].*?(?=\n## \[|\z)"
          $match     = [regex]::Match($content, $pattern)

          if (-not $match.Success) {
            Write-Error "No CHANGELOG entry found for version $version"
            exit 1
          }

          $notes = $match.Value.Trim()
          # Write to file to avoid multiline env-var escaping issues
          $notes | Set-Content release-notes.txt -Encoding UTF8
          Write-Host "Extracted release notes for $version"

      - name: Create GitHub Release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs   = require('fs');
            const body = fs.readFileSync('release-notes.txt', 'utf8');
            const tag  = context.ref.replace('refs/tags/', '');

            await github.rest.repos.createRelease({
              owner:            context.repo.owner,
              repo:             context.repo.repo,
              tag_name:         tag,
              name:             `Release ${tag}`,
              body:             body,
              draft:            false,
              prerelease:       tag.includes('-'),
            });
            core.info(`Release ${tag} created.`);

  # Publishes to the PowerShell Gallery when the PSGALLERY_API_KEY secret is
  # configured; otherwise skips with a notice so tag pushes never fail on a
  # missing key. The staged-folder build keeps tests/docs/workflows out of the
  # package (Publish-PSResource ships the entire target folder).
  publish-psgallery:
    name: Publish to PowerShell Gallery
    runs-on: ubuntu-latest
    env:
      PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Publish module
        if: env.PSGALLERY_API_KEY != ''
        shell: pwsh
        run: |
          $tagVer = '${{ github.ref_name }}'.TrimStart('v')
          $m = Test-ModuleManifest ./AzureDemoEnvironment.psd1
          if ($m.Version.ToString() -ne $tagVer) {
            throw "Manifest version $($m.Version) does not match tag $tagVer — bump ModuleVersion in AzureDemoEnvironment.psd1 before tagging."
          }
          $staged = ./tools/Build-ModulePackage.ps1 -OutputPath $env:RUNNER_TEMP | Select-Object -Last 1
          Publish-PSResource -Path $staged -Repository PSGallery -ApiKey $env:PSGALLERY_API_KEY
          Write-Host "Published AzureDemoEnvironment v$tagVer to the PowerShell Gallery."

      - name: Gallery publish skipped
        if: env.PSGALLERY_API_KEY == ''
        run: echo "PSGALLERY_API_KEY secret not configured — skipping PowerShell Gallery publish."
