version: 2
updates:
  # Keep GitHub Actions up to date.
  # Dependabot will open PRs to pin/update action versions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(actions)"
    groups:
      # Batch all action updates into a single PR per week
      github-actions:
        patterns:
          - "*"

  # Track NuGet packages downloaded on-demand by scripts/seed-data.ps1.
  # When Dependabot opens a PR here, also update the -Version and
  # -ExpectedSha512 arguments in the Get-AdeNuGetDll call sites in
  # scripts/seed-data.ps1 (new hash from NuGet registration API).
  - package-ecosystem: "nuget"
    directory: "/tools"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "fix(deps)"
